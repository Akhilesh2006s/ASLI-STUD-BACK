# Frontend SPA: aslilearn.ai → www.aslilearn.ai (canonical)
# Upload dist to: /var/www/aslilearn-frontend
# sudo certbot --nginx -d aslilearn.ai -d www.aslilearn.ai

server {
    listen 80;
    listen [::]:80;
    server_name aslilearn.ai www.aslilearn.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://www.aslilearn.ai$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aslilearn.ai;

    # ssl_certificate ... (certbot)

    return 301 https://www.aslilearn.ai$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aslilearn.ai;

    root /var/www/aslilearn-frontend;
    index index.html;

    # ssl_certificate ... (certbot)

    location / {
        try_files $uri $uri/ /index.html;
    }
}
