# Full example for api.aslilearn.ai on DigitalOcean (134.199.232.175)
# After editing: sudo nginx -t && sudo systemctl reload nginx
#
# Install SSL (once): sudo certbot --nginx -d api.aslilearn.ai
# Certbot will insert ssl_certificate lines; if missing, add them under listen 443 ssl.

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.aslilearn.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API + static uploads (Express serves /uploads from disk)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aslilearn.ai;

    # Large uploads (match multer 100MB in routes/superAdmin.js)
    client_max_body_size 100M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    # SSL — Certbot usually fills these; uncomment paths if needed:
    # ssl_certificate /etc/letsencrypt/live/api.aslilearn.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.aslilearn.ai/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy ALL paths to Node (includes /api/* and /uploads/*)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
