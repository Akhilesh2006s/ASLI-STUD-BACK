# Full example for api.aslilearn.ai on DigitalOcean (134.199.232.175)
# After editing: sudo nginx -t && sudo systemctl reload nginx
#
# Merge this into the ACTIVE server { } for api.aslilearn.ai (Certbot may own
# /etc/nginx/sites-enabled/). At minimum, copy these directives into that block:
#   client_max_body_size 100M;
#   client_body_timeout 300s;
#   proxy_connect_timeout 300s;
#   proxy_send_timeout 300s;
#   proxy_read_timeout 300s;
#   send_timeout 300s;
#
# Backend: Node on 127.0.0.1:5000 (change if your PM2 app uses another port).
#
#   sudo nginx -t && sudo systemctl reload nginx
#
# Do NOT duplicate CORS in nginx if Express already sets CORS — duplicate
# Access-Control-Allow-Origin headers break browsers. Rely on Express for CORS
# once requests reach the app (after body size is fixed).
# ---------------------------------------------------------------

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.aslilearn.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS API + Express static /uploads
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aslilearn.ai;

    # Match multer limit in routes/superAdmin.js (100MB)
    client_max_body_size 100M;
    client_body_timeout 300s;

    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # SSL — Certbot manages on the live host, e.g.:
    # ssl_certificate /etc/letsencrypt/live/api.aslilearn.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.aslilearn.ai/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # Long-running AI batch endpoints (book + AI generator sync fallback)
    location ~ ^/api/(book-generator/generate-batch|ai-generator/generate-batch) {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        send_timeout 900s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
