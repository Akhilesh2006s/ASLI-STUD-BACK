# Paste inside the server { } block for api.aslilearn.ai on your droplet.
# Without this, uploads > ~1MB often get HTTP 413 from Nginx with NO CORS headers;
# the browser then reports "blocked by CORS" instead of "payload too large".

client_max_body_size 100M;
proxy_read_timeout 300s;
proxy_connect_timeout 300s;
proxy_send_timeout 300s;
